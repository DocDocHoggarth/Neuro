      let currentSeed = seed + items.length * 17 + 9;
      for (let index = copy.length - 1; index > 0; index -= 1) {
        currentSeed = (currentSeed * 9301 + 49297) % 233280;
        const swapIndex = Math.floor((currentSeed / 233280) * (index + 1));
        [copy[index], copy[swapIndex]] = [copy[swapIndex], copy[index]];
      }
      return copy;
    };

          misses: (nextBucket[label]?.misses || 0) + (isCorrect ? 0 : 1),

                    : "border-[rgba(27,46,68,0.12)] bg-white/80 text-[var(--slate-soft)] hover:border-[rgba(91,143,139,0.35)] hover:text-[var(--slate)]"
                )}
              >
                {tab.label}
              </button>
            ))}
          </div>

          {activeView === "atlas" ? (
            <>
              <div className="mt-6 flex flex-wrap gap-3" role="tablist" aria-label="Reference atlas tabs">
                {tabMeta.map((tab) => (
                  <button
                    key={tab.id}
                    type="button"
                    role="tab"
                    aria-selected={activeTab === tab.id}
                    aria-label={`Open ${tab.label}`}
                    onClick={() => setActiveTab(tab.id)}
                    className={cn(
                      "rounded-full border px-4 py-2 text-sm font-semibold transition focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[var(--teal)]",
                      activeTab === tab.id
                        ? "border-[rgba(166,25,46,0.45)] bg-[rgba(166,25,46,0.14)] text-[var(--slate)]"
                        : "border-[rgba(27,46,68,0.12)] bg-white/80 text-[var(--slate-soft)] hover:border-[rgba(91,143,139,0.35)] hover:text-[var(--slate)]"
                    )}
                  >
                    {tab.label}
                  </button>
                ))}
              </div>

              <div className="mt-6 grid gap-4 xl:grid-cols-2">
                {explorerData[activeTab].map((entry) => {
                  const expanded = expandedCards.includes(entry.id);
                  return (
                    <article
                      key={entry.id}
                      className="overflow-hidden rounded-[24px] border border-[rgba(27,46,68,0.1)] bg-[var(--paper-strong)] shadow-card"
                      data-card-animation="slide"
                    >
                      <button
                        type="button"
                        onClick={() => toggleCard(entry.id)}
                        aria-expanded={expanded}
                        aria-label={`${expanded ? "Collapse" : "Expand"} ${entry.name}`}
                        className="flex w-full items-start justify-between gap-4 px-5 py-5 text-left focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[var(--teal)]"
                      >
                        <div>
                          <div className="mb-2 flex flex-wrap gap-2">
                            <span className="rounded-full bg-[rgba(0,183,201,0.13)] px-3 py-1 text-xs font-semibold uppercase tracking-[0.16em] text-[var(--teal)]">
                              {entry.roots}
                            </span>
                            {activeTab === "spaces" ? (
                              <span className="rounded-full bg-[rgba(166,25,46,0.13)] px-3 py-1 text-xs font-semibold uppercase tracking-[0.16em] text-[var(--amber)]">
                                Atlas space
                              </span>
                            ) : null}
                          </div>
                          <h3 className="text-2xl leading-tight text-[var(--slate)]" style={{ fontFamily: '"Playfair Display", serif' }}>
                            {entry.name}
                          </h3>
                          <p className="mt-2 text-sm leading-6 text-[var(--slate-soft)]">{entry.course}</p>
                        </div>
                        <span className="rounded-full border border-[rgba(27,46,68,0.1)] px-3 py-1 text-xs font-semibold uppercase tracking-[0.16em] text-[var(--slate-soft)]">
                          {expanded ? "Hide" : "Open"}
                        </span>
                      </button>

                      {expanded ? (
                        <div className="grid gap-4 border-t border-[rgba(27,46,68,0.08)] px-5 py-5 md:grid-cols-2" data-card-animation="fade">
                          <div className="rounded-[18px] bg-[rgba(27,46,68,0.04)] p-4">
                            <p className="text-xs font-semibold uppercase tracking-[0.18em] text-[var(--amber)]">Motor</p>
                            <p className="mt-2 text-sm leading-6 text-[var(--slate)]">{entry.motor}</p>
                          </div>
                          <div className="rounded-[18px] bg-[rgba(0,183,201,0.08)] p-4">
                            <p className="text-xs font-semibold uppercase tracking-[0.18em] text-[var(--teal)]">Sensory / Spatial</p>
                            <p className="mt-2 text-sm leading-6 text-[var(--slate)]">{entry.sensory}</p>
                          </div>
                          <div className="rounded-[18px] bg-[rgba(166,25,46,0.08)] p-4 md:col-span-2">
                            <p className="text-xs font-semibold uppercase tracking-[0.18em] text-[var(--amber)]">Key Clinical Point</p>
                            <p className="mt-2 text-sm leading-6 text-[var(--slate)]">{entry.clinical}</p>
                          </div>

                          {entry.branches ? (
                            <div className="md:col-span-2">
                              <div className="mb-3 flex items-center gap-3">
                                <div className="h-px flex-1 bg-[rgba(27,46,68,0.08)]"></div>
                                <p className="text-xs font-semibold uppercase tracking-[0.2em] text-[var(--slate-soft)]">Branch Detail</p>
                                <div className="h-px flex-1 bg-[rgba(27,46,68,0.08)]"></div>
                              </div>
                              <div className="grid gap-3 md:grid-cols-2">
                                {entry.branches.map((branch) => (
                                  <div key={branch.title} className="rounded-[18px] border border-[rgba(27,46,68,0.1)] bg-white px-4 py-4 shadow-soft">
                                    <p className="text-sm font-semibold uppercase tracking-[0.12em] text-[var(--teal)]">{branch.title}</p>
                                    <p className="mt-2 text-sm leading-6 text-[var(--slate)]">{branch.details}</p>
                                    {branch.children ? (
                                      <ul className="mt-3 space-y-2 text-sm leading-6 text-[var(--slate-soft)]">
                                        {branch.children.map((child) => (
                                          <li key={child} className="rounded-2xl bg-[rgba(27,46,68,0.04)] px-3 py-2">
                                            {child}
                                          </li>
                                        ))}
                                      </ul>
                                    ) : null}
                                  </div>
                                ))}

                      ) : null}

                  );
                })}
              </div>
            </>
          ) : null}

          {activeView === "compare" ? <div className="mt-6"><CompareNervesView /></div> : null}
          {activeView === "lesion" ? <div className="mt-6"><LesionBuilderView /></div> : null}
        </SectionShell>
      );
    };

    const QuestionDeck = ({ sectionKey, title, subtitle, questions, onRecord, resetSignal, shuffleChoices = false, trackingMap = null }) => {
      const [seed, setSeed] = useState(1);
      const [index, setIndex] = useState(0);
      const [answers, setAnswers] = useState({});

      const deck = useMemo(
        () =>
          shuffleArray(questions, seed).map((question, questionIndex) => ({
            ...question,
            displayOptions: shuffleChoices
              ? shuffleArray(question.options, seed + (questionIndex + 1) * 37 + question.id.length)
              : question.options,
          })),
        [questions, seed, shuffleChoices]
      );
      const current = deck[index];
      const answeredCurrent = current ? answers[current.id] : null;
      const completed = index >= deck.length;

      useEffect(() => {
        setSeed(resetSignal + 1);
        setIndex(0);
        setAnswers({});
      }, [resetSignal]);

      const restartDeck = useCallback(() => {
        setSeed((value) => value + 1);
        setIndex(0);
        setAnswers({});
      }, []);

      const handleAnswer = useCallback(
        (choice) => {
          if (!current || answers[current.id]) return;
          const isCorrect = choice === current.answer;
          setAnswers((existing) => ({
            ...existing,
            [current.id]: {
              choice,
              isCorrect,
            },
          }));
          onRecord(sectionKey, isCorrect, trackingMap?.[current.id] || null);
        },
        [answers, current, onRecord, sectionKey, trackingMap]
      );

      const correctCount = Object.values(answers).filter((item) => item.isCorrect).length;
      const percent = getPercent(correctCount, Object.keys(answers).length);

      return (
        <SectionShell
          eyebrow={sectionKey === "nerveId" ? "Section 2" : "Section 6"}
          title={title}
          subtitle={subtitle}
          actions={
            <>
              <ScorePill value={`${Math.min(index + (answeredCurrent ? 1 : 0), deck.length)} / ${deck.length}`} label="Current progress" />
              <ScorePill value={`${correctCount}/${Object.keys(answers).length || 0}`} label="This attempt" />
            </>
          }
        >
          {completed ? (
            <div className="rounded-[24px] border border-[rgba(27,46,68,0.1)] bg-white px-6 py-8 shadow-card" data-card-animation="fade">
              <div className="grid gap-4 md:grid-cols-[1.2fr_0.8fr] md:items-center">
                <div>
                  <p className="text-xs font-semibold uppercase tracking-[0.24em] text-[var(--amber)]">Attempt complete</p>
                  <h3 className="mt-2 text-3xl text-[var(--slate)]" style={{ fontFamily: '"Playfair Display", serif' }}>
                    {correctCount} correct out of {deck.length}
                  </h3>
                  <p className="mt-3 max-w-2xl text-base leading-7 text-[var(--slate-soft)]">
                    Review the explanations and start a fresh randomized attempt whenever you want another pass.
                  </p>
                </div>
                <div className="rounded-[22px] bg-[rgba(27,46,68,0.05)] p-5">
                  <div className="flex items-end justify-between">
                    <span className="text-sm uppercase tracking-[0.14em] text-[var(--slate-soft)]">Attempt score</span>
                    <span className="text-4xl font-semibold text-[var(--slate)]">{percent}%</span>
                  </div>
                  <div className="mt-4 h-3 rounded-full bg-[rgba(27,46,68,0.08)]">
                    <div
                      className="h-3 rounded-full transition-all duration-500"
                      style={{
                        width: `${percent}%`,
                        background: getPerformanceTone(percent, deck.length).bar,
                      }}
                    />
                  </div>
                  <button
                    type="button"
                    onClick={restartDeck}
                    className="mt-5 w-full rounded-2xl bg-[var(--slate)] px-4 py-3 text-sm font-semibold text-white transition hover:opacity-95 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[var(--teal)]"
                  >
                    New randomized attempt
                  </button>
                </div>
              </div>
            </div>
          ) : (
            <div className="grid gap-6 lg:grid-cols-[0.75fr_1.25fr]">
              <div className="rounded-[24px] border border-[rgba(27,46,68,0.1)] bg-[rgba(27,46,68,0.04)] p-5">
                <p className="text-xs font-semibold uppercase tracking-[0.2em] text-[var(--teal)]">Question set</p>
                <h3 className="mt-2 text-2xl text-[var(--slate)]" style={{ fontFamily: '"Playfair Display", serif' }}>
                  Immediate feedback
                </h3>
                <p className="mt-3 text-sm leading-7 text-[var(--slate-soft)]">
                  Answer one prompt at a time. Correct answers pulse in amber-green, incorrect answers shake and reveal the best answer immediately.
                </p>
                <div className="mt-5 space-y-3">
                  {deck.map((question, questionIndex) => {
                    const status = answers[question.id];
                    return (
                      <div
                        key={question.id}
                        className={cn(
                          "rounded-2xl border px-4 py-3 text-sm transition",
                          questionIndex === index
                            ? "border-[rgba(184,135,28,0.35)] bg-[rgba(184,135,28,0.12)]"
                            : status?.isCorrect
                              ? "border-[rgba(63,124,83,0.22)] bg-[rgba(63,124,83,0.08)]"
                              : status && !status.isCorrect
                                ? "border-[rgba(184,92,111,0.24)] bg-[rgba(184,92,111,0.08)]"
                                : "border-[rgba(27,46,68,0.08)] bg-white"
                        )}
                      >
                        <div className="flex items-center justify-between gap-3">
                          <span className="font-semibold text-[var(--slate)]">Question {questionIndex + 1}</span>
                          <span className="text-xs uppercase tracking-[0.18em] text-[var(--slate-soft)]">
                            {status ? (status.isCorrect ? "Correct" : "Review") : questionIndex === index ? "Active" : "Pending"}
                          </span>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>

              <div className="rounded-[24px] border border-[rgba(27,46,68,0.1)] bg-white p-6 shadow-card" data-card-animation="fade">
                <div className="flex flex-wrap items-center justify-between gap-3">
                  <p className="text-xs font-semibold uppercase tracking-[0.2em] text-[var(--amber)]">
                    Question {index + 1} of {deck.length}
                  </p>
                  <button
                    type="button"
                    onClick={restartDeck}
                    className="rounded-full border border-[rgba(27,46,68,0.12)] px-4 py-2 text-sm font-semibold text-[var(--slate-soft)] transition hover:border-[rgba(91,143,139,0.35)] hover:text-[var(--slate)] focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[var(--teal)]"
                  >
                    Restart deck
                  </button>
                </div>
                <h3 className="mt-4 text-[1.9rem] leading-tight text-[var(--slate)]" style={{ fontFamily: '"Playfair Display", serif' }}>
                  {current.prompt}
                </h3>
                <div className="mt-6 grid gap-3">
                  {current.displayOptions.map((option) => {
                    const selected = answeredCurrent?.choice === option;
                    const isCorrect = option === current.answer;
                    const answered = Boolean(answeredCurrent);
                    return (
                      <button
                        key={option}
                        type="button"
                        onClick={() => handleAnswer(option)}
                        disabled={answered}
                        aria-label={`Choose ${option}`}
                        data-feedback={selected ? (answeredCurrent.isCorrect ? "correct" : "incorrect") : undefined}
                        className={cn(
                          "rounded-[20px] border px-5 py-4 text-left text-base transition focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[var(--teal)]",
                          !answered && "hover:-translate-y-[1px] hover:border-[rgba(91,143,139,0.35)] hover:bg-[rgba(91,143,139,0.05)]",
                          answered && isCorrect && "border-[rgba(63,124,83,0.32)] bg-[rgba(63,124,83,0.09)] text-[var(--slate)]",
                          answered && selected && !isCorrect && "border-[rgba(184,92,111,0.35)] bg-[rgba(184,92,111,0.1)] text-[var(--slate)]",
                          answered && !selected && !isCorrect && "border-[rgba(27,46,68,0.08)] bg-white text-[var(--slate-soft)]",
                          !answered && "border-[rgba(27,46,68,0.1)] bg-white text-[var(--slate)]"
                        )}
                      >
                        <div className="flex items-start justify-between gap-4">
                          <span>{option}</span>
                          {answered && isCorrect ? <span className="text-lg text-[var(--success)]">✓</span> : null}
                          {answered && selected && !isCorrect ? <span className="text-lg text-[var(--rose)]">!</span> : null}
                        </div>
                      </button>
                    );
                  })}
                </div>

                {answeredCurrent ? (
                  <div
                    className={cn(
                      "mt-6 rounded-[22px] border px-5 py-5",
                      answeredCurrent.isCorrect
                        ? "border-[rgba(63,124,83,0.24)] bg-[rgba(63,124,83,0.08)]"
                        : "border-[rgba(184,92,111,0.24)] bg-[rgba(184,92,111,0.08)]"
                    )}
                    aria-live="polite"
                  >
                    <p className="text-xs font-semibold uppercase tracking-[0.18em] text-[var(--slate-soft)]">
                      {answeredCurrent.isCorrect ? "Correct" : `Incorrect - correct answer: ${current.answer}`}
                    </p>
                    <p className="mt-2 text-sm leading-7 text-[var(--slate)]">{current.explanation}</p>
                    <button
                      type="button"
                      onClick={() => setIndex((value) => value + 1)}
                      className="mt-4 rounded-2xl bg-[var(--slate)] px-4 py-3 text-sm font-semibold text-white transition hover:opacity-95 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[var(--teal)]"
                    >
                      {index === deck.length - 1 ? "Finish section" : "Next question"}
                    </button>
                  </div>
                ) : null}
              </div>
            </div>
          )}
        </SectionShell>
      );
    };

    const CategorySortBoard = ({ sectionKey, activity, onRecord, resetSignal, showHintToggle = false }) => {
      const [placements, setPlacements] = useState({});
      const [draggedId, setDraggedId] = useState(null);
      const [activeTarget, setActiveTarget] = useState(null);
      const [feedback, setFeedback] = useState({ categoryId: null, tone: null, text: "" });
      const [showHints, setShowHints] = useState(false);
      const [revealedCategoryHints, setRevealedCategoryHints] = useState({});

      useEffect(() => {
        setPlacements({});
        setDraggedId(null);
        setActiveTarget(null);
        setFeedback({ categoryId: null, tone: null, text: "" });
        setShowHints(false);
        setRevealedCategoryHints({});
      }, [activity.id, resetSignal]);

      const remainingItems = activity.items.filter((item) => !placements[item.id]);

      const handleDrop = useCallback(
        (categoryId, itemId) => {
          const isCorrect = activity.answerMap[itemId] === categoryId;
          onRecord(sectionKey, isCorrect, activity.itemTracking?.[itemId] || activity.tracking || null);

          if (isCorrect) {
            setPlacements((current) => ({ ...current, [itemId]: categoryId }));
            setFeedback({ categoryId, tone: "correct", text: activity.successText || "Placed correctly." });
          } else {
            setFeedback({ categoryId, tone: "incorrect", text: activity.errorText || "That item belongs in a different category." });
          }

          setDraggedId(null);
          setActiveTarget(null);
        },
        [activity.answerMap, activity.itemTracking, activity.tracking, onRecord, sectionKey]
      );

      const getPlacedItems = useCallback(
        (categoryId) =>
          activity.items.filter((item) => placements[item.id] === categoryId),
        [activity.items, placements]
      );

      return (
        <div className="grid gap-6 xl:grid-cols-[0.68fr_1.32fr]" data-card-animation="fade">
          <div className="rounded-[24px] border border-[rgba(27,46,68,0.1)] bg-[rgba(27,46,68,0.04)] p-5">
            <div className="flex items-start justify-between gap-4">
              <div>
                <p className="text-xs font-semibold uppercase tracking-[0.2em] text-[var(--amber)]">
                  {activity.bankLabel || "Structure bank"}
                </p>
                <h3 className="mt-2 text-2xl text-[var(--slate)]" style={{ fontFamily: '"Playfair Display", serif' }}>
                  {remainingItems.length ? "Drag into place" : "Board complete"}
                </h3>
              </div>
              {showHintToggle && activity.hints ? (
                <button
                  type="button"
                  onClick={() => setShowHints((current) => !current)}
                  className="rounded-full border border-[rgba(184,135,28,0.24)] bg-[rgba(184,135,28,0.12)] px-4 py-2 text-sm font-semibold text-[var(--amber)] transition hover:opacity-90 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[var(--teal)]"
                >
                  {showHints ? "Hide hints" : "Show hints"}
                </button>
              ) : null}
            </div>

            {showHints && activity.hints ? (
              <div className="mt-4 space-y-3">
                {activity.hints.map((hint) => (
                  <div key={hint} className="rounded-[18px] bg-[rgba(184,135,28,0.1)] px-4 py-3 text-sm leading-6 text-[var(--slate)]">
                    {hint}
                  </div>
                ))}
              </div>
            ) : null}

            <div className="mt-5 grid gap-3">
              {remainingItems.map((item) => (
                <div
                  key={item.id}
                  draggable
                  onDragStart={(event) => {
                    event.dataTransfer.setData("text/plain", item.id);
                    setDraggedId(item.id);
                  }}
                  onDragEnd={() => {
                    setDraggedId(null);
                    setActiveTarget(null);
                  }}
                  aria-label={`Drag ${item.label}`}
                  data-dragging={draggedId === item.id ? "true" : "false"}
                  className="cursor-grab rounded-[20px] border border-[rgba(27,46,68,0.1)] bg-white px-4 py-4 text-sm font-semibold text-[var(--slate)] shadow-soft transition active:cursor-grabbing"
                >
                  {item.label}
                </div>
              ))}
              {!remainingItems.length ? (
                <div className="rounded-[20px] border border-[rgba(63,124,83,0.24)] bg-[rgba(63,124,83,0.08)] px-4 py-4 text-sm leading-6 text-[var(--slate)]">
                  Every item has been sorted correctly on this activity.
                </div>
              ) : null}
            </div>
          </div>

          <div className="grid gap-4 md:grid-cols-2 xl:grid-cols-3">
            {activity.categories.map((category) => {
              const placed = getPlacedItems(category.id);
              const isActive = activeTarget === category.id;
              const categoryFeedback = feedback.categoryId === category.id ? feedback.tone : null;
              const hintRevealed = revealedCategoryHints[category.id];
              return (
                <div
                  key={category.id}
                  onDragOver={(event) => {
                    event.preventDefault();
                    setActiveTarget(category.id);
                  }}
                  onDragLeave={() => setActiveTarget((current) => (current === category.id ? null : current))}
                  onDrop={(event) => {
                    event.preventDefault();
                    const itemId = event.dataTransfer.getData("text/plain") || draggedId;
                    if (itemId) handleDrop(category.id, itemId);
                  }}
                  aria-label={`${category.title} drop zone`}
                  data-drop-state={isActive ? "active" : undefined}
                  data-feedback={categoryFeedback || undefined}
                  className="min-h-[220px] rounded-[24px] border border-[rgba(27,46,68,0.1)] bg-white p-4 shadow-soft transition"
                >
                  <p className="text-xs font-semibold uppercase tracking-[0.18em] text-[var(--slate-soft)]">{category.note}</p>
                  <h4 className="mt-2 text-xl text-[var(--slate)]" style={{ fontFamily: '"Playfair Display", serif' }}>
                    {category.title}
                  </h4>
                  <div className="mt-4 space-y-2">
                    {placed.length ? (
                      placed.map((item) => (
                        <div key={item.id} className="rounded-2xl bg-[rgba(184,135,28,0.12)] px-3 py-2 text-sm font-semibold text-[var(--slate)]">
                          {item.label}
                        </div>
                      ))
                    ) : (
                      <div className="rounded-2xl border border-dashed border-[rgba(27,46,68,0.16)] px-4 py-6 text-sm text-[var(--slate-soft)]">
                        {activity.dropPrompt || "Drop matching structures here"}
                      </div>
                    )}
                  </div>
                  {category.subtitle ? (
                    activity.revealSubtitleAsHint ? (
                      hintRevealed ? (
                        <div className="mt-4 rounded-2xl bg-[rgba(91,143,139,0.1)] px-4 py-3 text-sm leading-6 text-[var(--slate)]">
                          {category.subtitle}
                        </div>
                      ) : (
                        <button
                          type="button"
                          onClick={() =>
                            setRevealedCategoryHints((current) => ({
                              ...current,
                              [category.id]: true,
                            }))
                          }
                          className="mt-4 rounded-full border border-[rgba(91,143,139,0.24)] bg-[rgba(91,143,139,0.08)] px-4 py-2 text-sm font-semibold text-[var(--teal)] transition hover:opacity-90 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[var(--teal)]"
                        >
                          {activity.hintButtonLabel || "Reveal hint"}
                        </button>
                      )
                    ) : (
                      <p className="mt-4 text-sm leading-6 text-[var(--slate-soft)]">{category.subtitle}</p>
                    )
                  ) : null}
                </div>
              );
            })}
          </div>
          <div className="xl:col-start-2">
            <p className="text-sm text-[var(--slate-soft)]" aria-live="polite">{feedback.text}</p>
          </div>
        </div>
      );
    };

    const MatchingSection = ({ onRecord, resetSignal }) => {
      const [activeActivity, setActiveActivity] = useState(matchingActivities[0].id);
      const currentActivity = matchingActivities.find((item) => item.id === activeActivity);

      useEffect(() => {
        setActiveActivity(matchingActivities[0].id);
      }, [resetSignal]);

      return (
        <SectionShell
          eyebrow="Section 3"
          title="Matching"
          subtitle="Use native drag-and-drop to connect roots, muscle groups, and sensory territories with the correct upper-extremity nerves."
          actions={
            <>
              <ScorePill value="3 boards" label="Roots, muscles, sensation" />
              <ScorePill value="HTML5 drag" label="Native interactions" />
            </>
          }
        >
          <div className="flex flex-wrap gap-3">
            {matchingActivities.map((activity) => (
              <button
                key={activity.id}
                type="button"
                onClick={() => setActiveActivity(activity.id)}
                className={cn(
                  "rounded-full border px-4 py-2 text-sm font-semibold transition focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[var(--teal)]",
                  activeActivity === activity.id
                    ? "border-[rgba(184,135,28,0.45)] bg-[rgba(184,135,28,0.14)] text-[var(--slate)]"
                    : "border-[rgba(27,46,68,0.12)] bg-white/80 text-[var(--slate-soft)] hover:border-[rgba(91,143,139,0.35)] hover:text-[var(--slate)]"
                )}
              >
                {activity.title}
              </button>
            ))}
          </div>
          <div className="mt-6 rounded-[26px] border border-[rgba(27,46,68,0.1)] bg-[rgba(255,255,255,0.7)] p-5">
            <p className="text-xs font-semibold uppercase tracking-[0.2em] text-[var(--teal)]">{currentActivity.title}</p>
            <p className="mt-2 text-base leading-7 text-[var(--slate-soft)]">{currentActivity.subtitle}</p>
            <div className="mt-6">
              <CategorySortBoard sectionKey="matching" activity={currentActivity} onRecord={onRecord} resetSignal={resetSignal} />
            </div>
          </div>
        </SectionShell>
      );
    };

    const CompartmentSection = ({ onRecord, resetSignal }) => (
      <SectionShell
        eyebrow="Section 4"
        title="Compartment Challenge"
        subtitle="Sort each nerve into the shoulder, arm, forearm, hand, thoracic-wall, or scapular region it defines. The layout is arranged like a simplified upper-extremity map for fast regional review."
        actions={
          <>
            <ScorePill value="11 regions" label="Compartment map" />
            <ScorePill value="Motor + sensory" label="Regional sorting" />
          </>
        }
      >
        <div className="mb-6 grid gap-4 rounded-[26px] border border-[rgba(27,46,68,0.1)] bg-[rgba(27,46,68,0.04)] p-5 md:grid-cols-3">
          <div className="rounded-[22px] bg-white p-4 shadow-soft">
            <p className="text-xs font-semibold uppercase tracking-[0.18em] text-[var(--amber)]">Shoulder + scapula</p>
            <p className="mt-2 text-sm leading-6 text-[var(--slate-soft)]">Keep deltoid, scapular, and thoracic-wall motor patterns separate.</p>
          </div>
          <div className="rounded-[22px] bg-white p-4 shadow-soft">
            <p className="text-xs font-semibold uppercase tracking-[0.18em] text-[var(--amber)]">Arm + forearm</p>
            <p className="mt-2 text-sm leading-6 text-[var(--slate-soft)]">Anterior arm, forearm, and posterior forearm pathways stay visually distinct.</p>
          </div>
          <div className="rounded-[22px] bg-white p-4 shadow-soft">
            <p className="text-xs font-semibold uppercase tracking-[0.18em] text-[var(--amber)]">Hand</p>
            <p className="mt-2 text-sm leading-6 text-[var(--slate-soft)]">Finish with intrinsic hand and cutaneous branch patterns across the palm and dorsum.</p>
          </div>
        </div>
        <CategorySortBoard sectionKey="compartment" activity={compartmentActivity} onRecord={onRecord} resetSignal={resetSignal} />
      </SectionShell>
    );

    const SpacesSection = ({ onRecord, resetSignal }) => {
      const [activeActivity, setActiveActivity] = useState(spaceActivities[0].id);
      const currentActivity = spaceActivities.find((item) => item.id === activeActivity);

      useEffect(() => {
        setActiveActivity(spaceActivities[0].id);
      }, [resetSignal]);

      return (
        <SectionShell
          eyebrow="Section 5"
          title="Anatomical Spaces"
          subtitle="Build the axilla, posterior shoulder spaces, cubital fossa, and the major neck triangles from their borders, contents, vessels, and nerves."
          actions={
            <>
              <ScorePill value="8 builders" label="Borders + contents" />
              <ScorePill value="Mnemonic support" label="Toggle hints" />
            </>
          }
        >
          <div className="flex flex-wrap gap-3">
            {spaceActivities.map((activity) => (
              <button
                key={activity.id}
                type="button"
                onClick={() => setActiveActivity(activity.id)}
                className={cn(
                  "rounded-full border px-4 py-2 text-sm font-semibold transition focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[var(--teal)]",
                  activeActivity === activity.id
                    ? "border-[rgba(184,135,28,0.45)] bg-[rgba(184,135,28,0.14)] text-[var(--slate)]"
                    : "border-[rgba(27,46,68,0.12)] bg-white/80 text-[var(--slate-soft)] hover:border-[rgba(91,143,139,0.35)] hover:text-[var(--slate)]"
                )}
              >
                {activity.title}
              </button>
            ))}
          </div>

          <div className="mt-6 rounded-[26px] border border-[rgba(27,46,68,0.1)] bg-[rgba(255,255,255,0.7)] p-5">
            <p className="text-xs font-semibold uppercase tracking-[0.2em] text-[var(--teal)]">{currentActivity.title}</p>
            <p className="mt-2 text-base leading-7 text-[var(--slate-soft)]">{currentActivity.subtitle}</p>
            <div className="mt-6">
              <CategorySortBoard
                sectionKey="spaces"
                activity={currentActivity}
                onRecord={onRecord}
                resetSignal={resetSignal}
                showHintToggle={Boolean(currentActivity.hints)}
              />
            </div>
          </div>
        </SectionShell>
      );
    };

    const DashboardSection = ({ scores, weakSpots, onReset }) => {
      const overall = useMemo(() => {
        const summary = SCORED_SECTIONS.reduce(
          (accumulator, section) => {
            const stats = scores[section.key];
            return {
              correct: accumulator.correct + stats.correct,
              attempted: accumulator.attempted + stats.attempted,
            };
          },
          { correct: 0, attempted: 0 }
        );
        return {
          ...summary,
          percent: getPercent(summary.correct, summary.attempted),
        };
      }, [scores]);

      const nerveWeakSpots = useMemo(() => getWeakSpotList(weakSpots.nerves).slice(0, 5), [weakSpots.nerves]);
      const spaceWeakSpots = useMemo(() => getWeakSpotList(weakSpots.spaces).slice(0, 5), [weakSpots.spaces]);
      const sensoryWeakSpots = useMemo(() => getWeakSpotList(weakSpots.sensory).slice(0, 5), [weakSpots.sensory]);

      const WeakSpotPanel = ({ title, eyebrow, items }) => (
        <div className="rounded-[24px] border border-[rgba(27,46,68,0.1)] bg-white p-5 shadow-soft">
          <p className="text-xs font-semibold uppercase tracking-[0.18em] text-[var(--amber)]">{eyebrow}</p>
          <h4 className="mt-2 text-2xl text-[var(--slate)]" style={{ fontFamily: '"Playfair Display", serif' }}>
            {title}
          </h4>
          {items.length ? (
            <div className="mt-4 grid gap-3">
              {items.map((item) => (
                <div key={item.label} className="rounded-[18px] bg-[rgba(27,46,68,0.04)] px-4 py-4">
                  <div className="flex items-start justify-between gap-4">
                    <div>
                      <div className="font-semibold text-[var(--slate)]">{item.label}</div>
                      <div className="mt-1 text-sm text-[var(--slate-soft)]">{item.misses} misses across {item.attempts} tracked attempts</div>
                    </div>
                    <div className="rounded-full bg-[rgba(166,25,46,0.12)] px-3 py-1 text-sm font-semibold text-[var(--amber)]">
                      {item.missRate}% miss rate
                    </div>
                  </div>
                </div>
              ))}
            </div>
          ) : (
            <p className="mt-4 text-sm leading-7 text-[var(--slate-soft)]">Nothing is standing out here yet. As soon as a student starts missing related items, this panel will prioritize them for review.</p>
          )}
        </div>
      );

      return (
        <SectionShell
          eyebrow="Section 7"
          title="Score Dashboard"
          subtitle="Track performance across the active learning sections, identify weak areas quickly, and reset the session whenever you want a clean practice run."
          actions={
            <>
              <ScorePill value={`${overall.correct}/${overall.attempted || 0}`} label="Overall correct" />
              <button
                type="button"
                onClick={onReset}
                className="rounded-full bg-[var(--slate)] px-5 py-3 text-sm font-semibold text-white transition hover:opacity-95 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[var(--teal)]"
              >
                Reset All Scores
              </button>
            </>
          }
        >
          <div className="grid gap-5 lg:grid-cols-[0.7fr_1.3fr]">
            <div className="rounded-[26px] border border-[rgba(27,46,68,0.1)] bg-[rgba(27,46,68,0.04)] p-6">
              <p className="text-xs font-semibold uppercase tracking-[0.2em] text-[var(--amber)]">Overall session</p>
              <h3 className="mt-3 text-5xl text-[var(--slate)]" style={{ fontFamily: '"Playfair Display", serif' }}>
                {overall.percent}%
              </h3>
              <p className="mt-3 text-base leading-7 text-[var(--slate-soft)]">
                {overall.attempted
                  ? `${overall.correct} correct answers or placements across ${overall.attempted} scored attempts.`
                  : "No scored attempts yet. Begin with Nerve Identification, Matching, or the Clinical Scenarios to populate the dashboard."}
              </p>
              <div className="mt-5 h-3 rounded-full bg-[rgba(27,46,68,0.08)]">
                <div
                  className="h-3 rounded-full transition-all duration-500"
                  style={{
                    width: `${overall.percent}%`,
                    background: getPerformanceTone(overall.percent, overall.attempted).bar,
                  }}
                />
              </div>
              <div
                className="mt-5 inline-flex rounded-full px-4 py-2 text-sm font-semibold"
                style={{
                  color: getPerformanceTone(overall.percent, overall.attempted).text,
                  background: getPerformanceTone(overall.percent, overall.attempted).chip,
                }}
              >
                {getPerformanceTone(overall.percent, overall.attempted).label}
              </div>
            </div>

            <div className="grid gap-4">
              {SCORED_SECTIONS.map((section) => {
                const stats = scores[section.key];
                const percent = getPercent(stats.correct, stats.attempted);
                const tone = getPerformanceTone(percent, stats.attempted);
                return (
                  <div key={section.key} className="rounded-[24px] border border-[rgba(27,46,68,0.1)] bg-white p-5 shadow-soft">
                    <div className="flex flex-wrap items-center justify-between gap-4">
                      <div>
                        <p className="text-xs font-semibold uppercase tracking-[0.18em] text-[var(--slate-soft)]">Section performance</p>
                        <h4 className="mt-2 text-2xl text-[var(--slate)]" style={{ fontFamily: '"Playfair Display", serif' }}>
                          {section.label}
                        </h4>
                      </div>
                      <div className="text-right">
                        <div className="text-3xl font-semibold text-[var(--slate)]">{stats.attempted ? `${percent}%` : "--"}</div>
                        <div className="text-sm text-[var(--slate-soft)]">{stats.correct} / {stats.attempted} correct</div>
                      </div>
                    </div>
                    <div className="mt-4 h-3 rounded-full bg-[rgba(27,46,68,0.08)]">
                      <div className="h-3 rounded-full transition-all duration-500" style={{ width: `${percent}%`, background: tone.bar }} />
                    </div>
                    <div
                      className="mt-4 inline-flex rounded-full px-4 py-2 text-sm font-semibold"
                      style={{ color: tone.text, background: tone.chip }}
                    >
                      {tone.label}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
          <div className="mt-6 grid gap-5 lg:grid-cols-3">
            <WeakSpotPanel title="Most-missed nerves" eyebrow="Personal review" items={nerveWeakSpots} />
            <WeakSpotPanel title="Most-missed spaces" eyebrow="Spatial anatomy" items={spaceWeakSpots} />
            <WeakSpotPanel title="Sensory territories needing review" eyebrow="Cutaneous map" items={sensoryWeakSpots} />
          </div>
        </SectionShell>
      );
    };

    function UpperExtremityNerveAtlas() {
      const [activeSection, setActiveSection] = useState("explorer");
      const [scores, setScores] = useState(INITIAL_SCORES);
      const [weakSpots, setWeakSpots] = useState(createEmptyWeakSpots());
      const [resetSignal, setResetSignal] = useState(0);

      const overallStats = useMemo(() => {
        const summary = SCORED_SECTIONS.reduce(
          (accumulator, section) => {
            const stats = scores[section.key];
            return {
              correct: accumulator.correct + stats.correct,
              attempted: accumulator.attempted + stats.attempted,
            };
          },
          { correct: 0, attempted: 0 }
        );
        return { ...summary, percent: getPercent(summary.correct, summary.attempted) };
      }, [scores]);

      const recordResult = useCallback((sectionKey, isCorrect, tracking = null) => {
        setScores((current) => ({
          ...current,
          [sectionKey]: {
            correct: current[sectionKey].correct + (isCorrect ? 1 : 0),
            attempted: current[sectionKey].attempted + 1,
          },
        }));
        if (tracking) {
          setWeakSpots((current) => recordWeakSpot(current, tracking, isCorrect));
        }
      }, []);

      const resetAll = useCallback(() => {
        setScores({
          explorer: { correct: 0, attempted: 0 },
          nerveId: { correct: 0, attempted: 0 },
          matching: { correct: 0, attempted: 0 },
          compartment: { correct: 0, attempted: 0 },
          spaces: { correct: 0, attempted: 0 },
          clinical: { correct: 0, attempted: 0 },
        });
        setWeakSpots(createEmptyWeakSpots());
        setResetSignal((value) => value + 1);
        setActiveSection("dashboard");
      }, []);

      const renderSection = () => {
        switch (activeSection) {
          case "explorer":
            return <ExplorerSection />;
          case "nerveId":
            return (
              <QuestionDeck
                sectionKey="nerveId"
                title="Nerve Identification"
                subtitle="Read the anatomical description, identify the best nerve, and get immediate explanation-rich feedback. The question order is randomized on every fresh attempt."
                questions={nerveIdBank}
                onRecord={recordResult}
                resetSignal={resetSignal}
                shuffleChoices={true}
                trackingMap={nerveIdTrackingMap}
              />
            );
          case "matching":
            return <MatchingSection onRecord={recordResult} resetSignal={resetSignal} />;
          case "compartment":
            return <CompartmentSection onRecord={recordResult} resetSignal={resetSignal} />;
          case "spaces":
            return <SpacesSection onRecord={recordResult} resetSignal={resetSignal} />;
          case "clinical":
            return (
              <QuestionDeck
                sectionKey="clinical"
                title="Clinical Scenarios"
                subtitle="Apply the handout to short vignettes that connect anatomy, motor findings, sensory loss, and vulnerable anatomical locations."
                questions={clinicalBank}
                onRecord={recordResult}
                resetSignal={resetSignal}
                trackingMap={clinicalTrackingMap}
              />
            );
          case "dashboard":
            return <DashboardSection scores={scores} weakSpots={weakSpots} onReset={resetAll} />;
          default:
            return null;
        }
      };

      return (
        <div className="mx-auto max-w-[1560px] px-4 py-5 md:px-6 md:py-6">
          <header className="overflow-hidden rounded-[30px] border border-[rgba(27,46,68,0.12)] bg-[rgba(255,253,250,0.9)] shadow-atlas backdrop-blur-sm">
            <div className="grid gap-8 px-6 py-6 md:px-8 lg:grid-cols-[1.15fr_0.85fr] lg:items-center">
              <div>
                <p className="text-xs font-semibold uppercase tracking-[0.28em] text-[var(--amber)]">DPTD 731 interactive review</p>
                <h1
                  className="mt-4 text-[2.7rem] leading-[0.94] text-[var(--slate)] md:text-[4rem]"
                  style={{ fontFamily: '"Playfair Display", serif' }}
                >
                  Upper Extremity Nerve Atlas
                </h1>
                <p className="mt-5 max-w-3xl text-lg leading-8 text-[var(--slate-soft)]">
                  A single-file study and review tool for the brachial plexus, upper-extremity peripheral nerves, cutaneous territories, anatomical spaces of the upper extremity and neck, and clinical localization.
                </p>
              </div>

              <div className="grid gap-4 md:grid-cols-3 lg:grid-cols-1">
                <div className="rounded-[24px] border border-[rgba(27,46,68,0.1)] bg-white/85 p-5 shadow-card">
                  <p className="text-xs font-semibold uppercase tracking-[0.18em] text-[var(--teal)]">Learning design</p>
                  <p className="mt-3 text-sm leading-7 text-[var(--slate-soft)]">Reference browsing, recognition questions, drag-and-drop matching, region sorting, anatomical-space builders, and clinical reasoning.</p>
                </div>
                <div className="rounded-[24px] border border-[rgba(27,46,68,0.1)] bg-white/85 p-5 shadow-card">
                  <p className="text-xs font-semibold uppercase tracking-[0.18em] text-[var(--teal)]">Current session</p>
                  <div className="mt-3 flex items-end justify-between gap-4">
                    <span className="text-4xl font-semibold text-[var(--slate)]">{overallStats.percent}%</span>
                    <span className="text-sm text-[var(--slate-soft)]">{overallStats.correct}/{overallStats.attempted || 0} correct</span>
                  </div>
                  <div className="mt-4 h-3 rounded-full bg-[rgba(27,46,68,0.08)]">
                    <div
                      className="h-3 rounded-full transition-all duration-500"
                      style={{
                        width: `${overallStats.percent}%`,
                        background: getPerformanceTone(overallStats.percent, overallStats.attempted).bar,
                      }}
                    />
                  </div>
                </div>
                <div className="rounded-[24px] border border-[rgba(27,46,68,0.1)] bg-white/85 p-5 shadow-card">
                  <p className="text-xs font-semibold uppercase tracking-[0.18em] text-[var(--teal)]">Coverage</p>
                  <p className="mt-3 text-sm leading-7 text-[var(--slate-soft)]">Brachial plexus roots, trunks, cords, major branches, UE cutaneous maps, axilla, posterior shoulder spaces, cubital fossa, neck triangles, and upper-extremity regional localization.</p>
                </div>
              </div>
            </div>
          </header>

          <nav className="sticky top-3 z-30 mt-5 rounded-[26px] border border-[rgba(27,46,68,0.12)] bg-[rgba(255,253,250,0.9)] px-4 py-4 shadow-card backdrop-blur-md">
            <div className="flex flex-wrap gap-3">
              {APP_SECTIONS.map((section, sectionIndex) => (
                <button
                  key={section.key}
                  type="button"
                  onClick={() => setActiveSection(section.key)}
                  aria-label={`Open ${section.label}`}
                  className={cn(
                    "rounded-full border px-4 py-2 text-sm font-semibold transition focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[var(--teal)]",
                    activeSection === section.key
                      ? "border-[rgba(184,135,28,0.42)] bg-[rgba(184,135,28,0.14)] text-[var(--slate)]"
                      : "border-[rgba(27,46,68,0.1)] bg-white text-[var(--slate-soft)] hover:border-[rgba(91,143,139,0.35)] hover:text-[var(--slate)]"
                  )}
                >
                  <span className="mr-2 text-[var(--amber)]">{sectionIndex + 1}.</span>
                  {section.label}
                </button>
              ))}
            </div>
          </nav>

          <main className="mt-5">{renderSection()}</main>
        </div>
      );
    }

    const root = window.ReactDOM.createRoot(document.getElementById("root"));
    root.render(<UpperExtremityNerveAtlas />);
  </script>
</body>
</html>
