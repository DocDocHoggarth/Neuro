<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Build a Neuron - Label Activity</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Fraunces:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1729;
    --surface: #1a2540;
    --surface-hover: #223058;
    --border: #2a3a5c;
    --accent: #4ecdc4;
    --accent-glow: rgba(78, 205, 196, 0.25);
    --correct: #4ecdc4;
    --incorrect: #ff6b6b;
    --text: #e8edf5;
    --text-muted: #8892a8;
    --label-bg: #243052;
    --drop-zone-bg: rgba(78, 205, 196, 0.06);
    --drop-zone-border: rgba(78, 205, 196, 0.3);
    --leader: rgba(78, 205, 196, 0.4);
    --signal: #8ff7ff;
    --signal-hot: #fff5a7;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .container {
    max-width: 1000px;
    margin: 0 auto;
    padding: 24px 20px 40px;
  }

  header {
    text-align: center;
    margin-bottom: 24px;
  }

  header h1 {
    font-family: 'Fraunces', serif;
    font-weight: 900;
    font-size: 2rem;
    color: var(--accent);
    letter-spacing: -0.5px;
    margin-bottom: 6px;
  }

  header p {
    color: var(--text-muted);
    font-size: 0.93rem;
    line-height: 1.5;
  }

  .label-bank {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 18px;
    margin-bottom: 18px;
  }

  .label-bank h2 {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-muted);
    margin-bottom: 10px;
  }

  .labels-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .draggable-label {
    background: var(--label-bg);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 7px 13px;
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--text);
    cursor: grab;
    user-select: none;
    transition: all 0.2s ease;
    touch-action: none;
  }

  .draggable-label:hover {
    border-color: var(--accent);
    background: var(--surface-hover);
    box-shadow: 0 0 12px var(--accent-glow);
    transform: translateY(-1px);
  }

  .draggable-label:active,
  .draggable-label.dragging {
    cursor: grabbing;
    opacity: 0.5;
  }

  .draggable-label.placed {
    opacity: 0.3;
    pointer-events: none;
    border-style: dashed;
  }

  .diagram-area {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 10px;
    position: relative;
    overflow: hidden;
  }

  .diagram-canvas {
    position: relative;
    width: 100%;
  }

  .diagram-canvas svg {
    width: 100%;
    height: auto;
    display: block;
  }

  .drop-zone {
    background: var(--drop-zone-bg);
    border: 1.5px dashed var(--drop-zone-border);
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text-muted);
    transition: all 0.2s ease;
    cursor: default;
    white-space: nowrap;
    width: 100%;
    height: 100%;
  }

  .drop-zone.hover {
    border-color: var(--accent);
    background: rgba(78, 205, 196, 0.12);
    box-shadow: 0 0 14px var(--accent-glow);
  }

  .drop-zone.filled {
    border-style: solid;
    background: var(--label-bg);
    color: var(--text);
    font-weight: 500;
    cursor: pointer;
  }

  .drop-zone.correct {
    border-color: var(--correct);
    background: rgba(78, 205, 196, 0.15);
    color: var(--correct);
  }

  .drop-zone.incorrect {
    border-color: var(--incorrect);
    background: rgba(255, 107, 107, 0.12);
    color: var(--incorrect);
    animation: shake 0.4s ease;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-4px); }
    40% { transform: translateX(4px); }
    60% { transform: translateX(-3px); }
    80% { transform: translateX(3px); }
  }

  .drop-zone .hint-num {
    font-size: 9px;
    opacity: 0.5;
  }

  .controls {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-top: 18px;
    flex-wrap: wrap;
  }

  button {
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    padding: 9px 20px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s ease;
  }

  button:hover {
    border-color: var(--accent);
    background: var(--surface-hover);
  }

  button.primary {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
  }

  button.primary:hover {
    background: #3dbdb5;
    box-shadow: 0 0 20px var(--accent-glow);
  }

  .score-display {
    text-align: center;
    margin-top: 14px;
    font-size: 0.93rem;
    color: var(--text-muted);
    min-height: 22px;
  }

  .score-display.visible {
    color: var(--text);
  }

  .score-display span {
    color: var(--accent);
    font-weight: 700;
  }

  .score-display.success span {
    color: var(--signal-hot);
  }

  .drag-ghost {
    position: fixed;
    pointer-events: none;
    z-index: 1000;
    background: var(--accent);
    color: var(--bg);
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    padding: 7px 13px;
    border-radius: 8px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    transform: translate(-50%, -50%);
    white-space: nowrap;
  }

  .signal-path {
    fill: none;
    stroke: var(--signal);
    stroke-width: 7;
    stroke-linecap: round;
    stroke-linejoin: round;
    opacity: 0;
    filter: url(#signalGlow);
  }

  .signal-path.branch {
    stroke-width: 5;
  }

  .signal-particle {
    fill: var(--signal-hot);
    opacity: 0;
    filter: url(#signalGlowStrong);
  }

  .signal-highlight {
    opacity: 0;
    pointer-events: none;
    filter: url(#signalGlowStrong);
    transition: opacity 0.18s ease;
  }

  .signal-highlight.active {
    opacity: 1;
  }

  .signal-highlight.soft.active {
    opacity: 0.65;
  }

  .container.playing .draggable-label,
  .container.playing .drop-zone,
  .container.playing #checkBtn,
  .container.playing #revealBtn {
    pointer-events: none;
    opacity: 0.45;
  }

  @media (max-width: 600px) {
    .container { padding: 14px 10px 28px; }
    header h1 { font-size: 1.4rem; }
    .draggable-label { font-size: 0.78rem; padding: 5px 9px; }
  }
</style>
</head>

          </div>
        </foreignObject>

        <foreignObject x="500" y="495" width="90" height="32">
          <div xmlns="http://www.w3.org/1999/xhtml" class="drop-zone" id="dz-axon" data-answer="Axon">
            <span class="hint-num">8</span>
          </div>
        </foreignObject>

        <foreignObject x="720" y="495" width="160" height="32">
          <div xmlns="http://www.w3.org/1999/xhtml" class="drop-zone" id="dz-terminal" data-answer="Axon Terminal">
            <span class="hint-num">9</span>
          </div>
        </foreignObject>
      </svg>
    </div>
  </div>

  <div class="controls">
    <button class="primary" id="checkBtn">Check Answers</button>
    <button id="resetBtn">Reset</button>
    <button id="revealBtn">Reveal Answers</button>
  </div>

  <div class="score-display" id="scoreDisplay"></div>
</div>

<script>
const LABELS = [
  "Dendrites", "Cell Body (Soma)", "Nucleus", "Axon Hillock",
  "Axon", "Myelin Sheath", "Node of Ranvier", "Axon Terminal", "Synapse"
];

const labelBank = document.getElementById('labelBank');
const checkBtn = document.getElementById('checkBtn');
const resetBtn = document.getElementById('resetBtn');
const revealBtn = document.getElementById('revealBtn');
const scoreDisplay = document.getElementById('scoreDisplay');
const container = document.getElementById('container');
const signalParticle = document.getElementById('signal-particle');

let draggedLabel = null;
let ghost = null;
let isAnimating = false;
let animationRunId = 0;

const highlightGroups = [
  ['hl-myelin-1', 'hl-node-1'],
  ['hl-myelin-2', 'hl-node-2'],
  ['hl-myelin-3', 'hl-node-3'],
  ['hl-myelin-4', 'hl-node-4'],
  ['hl-myelin-5']
];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getDropZones() {
  return document.querySelectorAll('.drop-zone');
}

function buildLabels() {
  labelBank.innerHTML = '';
  shuffle(LABELS).forEach(label => {
    const el = document.createElement('div');
    el.className = 'draggable-label';
    el.textContent = label;
    el.dataset.label = label;
    el.setAttribute('draggable', 'true');
    el.addEventListener('dragstart', onDragStart);
    el.addEventListener('dragend', onDragEnd);
    el.addEventListener('touchstart', onTouchStart, { passive: false });
    el.addEventListener('touchmove', onTouchMove, { passive: false });
    el.addEventListener('touchend', onTouchEnd);
    labelBank.appendChild(el);
  });
}

function onDragStart(e) {
  if (isAnimating) {
    e.preventDefault();
    return;
  }
  draggedLabel = e.target;
  e.target.classList.add('dragging');
  e.dataTransfer.setData('text/plain', e.target.dataset.label);
  e.dataTransfer.effectAllowed = 'move';
}

function onDragEnd(e) {
  e.target.classList.remove('dragging');
  draggedLabel = null;
}

function setupDropZones() {
  getDropZones().forEach(dz => {
    dz.addEventListener('dragover', e => {
      if (isAnimating) return;
      e.preventDefault();
      dz.classList.add('hover');
    });
    dz.addEventListener('dragleave', () => dz.classList.remove('hover'));
    dz.addEventListener('drop', e => {
      if (isAnimating) return;
      e.preventDefault();
      dz.classList.remove('hover');
      placeLabel(dz, e.dataTransfer.getData('text/plain'));
    });
  });
}

function onTouchStart(e) {
  if (isAnimating) return;
  e.preventDefault();
  const touch = e.touches[0];
  draggedLabel = e.target;
  draggedLabel.classList.add('dragging');
  ghost = document.createElement('div');
  ghost.className = 'drag-ghost';
  ghost.textContent = draggedLabel.dataset.label;
  document.body.appendChild(ghost);
  moveGhost(touch.clientX, touch.clientY);
}

function onTouchMove(e) {
  if (isAnimating) return;
  e.preventDefault();
  if (!ghost) return;
  const touch = e.touches[0];
  moveGhost(touch.clientX, touch.clientY);
  getDropZones().forEach(dz => {
    const r = dz.getBoundingClientRect();
    dz.classList.toggle(
      'hover',
      touch.clientX >= r.left && touch.clientX <= r.right &&
      touch.clientY >= r.top && touch.clientY <= r.bottom
    );
  });
}

function onTouchEnd(e) {
  if (!draggedLabel) return;
  draggedLabel.classList.remove('dragging');
  if (ghost) {
    const touch = e.changedTouches[0];
    getDropZones().forEach(dz => {
      const r = dz.getBoundingClientRect();
      if (
        !isAnimating &&
        touch.clientX >= r.left && touch.clientX <= r.right &&
        touch.clientY >= r.top && touch.clientY <= r.bottom
      ) {
        placeLabel(dz, draggedLabel.dataset.label);
      }
      dz.classList.remove('hover');
    });
    ghost.remove();
    ghost = null;
  }
  draggedLabel = null;
}

function moveGhost(x, y) {
  if (!ghost) return;
  ghost.style.left = x + 'px';
  ghost.style.top = y + 'px';
}

function clearZone(dz, idx) {
  dz.classList.remove('filled', 'correct', 'incorrect');
  delete dz.dataset.placed;
  dz.onclick = null;
  dz.innerHTML = '<span class="hint-num">' + (idx + 1) + '</span>';
}

function placeLabel(dz, labelText) {
  if (isAnimating || !labelText) return;
  if (dz.dataset.placed) returnToBank(dz.dataset.placed);
  dz.textContent = labelText;
  dz.dataset.placed = labelText;
  dz.classList.add('filled');
  dz.classList.remove('correct', 'incorrect');

  const bankLabel = [...labelBank.querySelectorAll('.draggable-label')]
    .find(el => el.dataset.label === labelText && !el.classList.contains('placed'));
  if (bankLabel) bankLabel.classList.add('placed');

  dz.onclick = () => {
    if (isAnimating) return;
    returnToBank(labelText);
    clearZone(dz, [...getDropZones()].indexOf(dz));
    clearFeedback();
  };

  clearFeedback();
}

function returnToBank(labelText) {
  const el = [...labelBank.querySelectorAll('.draggable-label')]
    .find(node => node.dataset.label === labelText && node.classList.contains('placed'));
  if (el) el.classList.remove('placed');
}

function clearFeedback() {
  scoreDisplay.textContent = '';
  scoreDisplay.className = 'score-display';
  getDropZones().forEach(dz => dz.classList.remove('correct', 'incorrect'));
}

function initializeSignalPaths() {
  document.querySelectorAll('.signal-path').forEach(path => {
    const length = path.getTotalLength();
    path.dataset.length = String(length);
    path.style.strokeDasharray = length;
    path.style.strokeDashoffset = length;
  });
}

function setHighlight(ids, active) {
  ids.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.toggle('active', active);
  });
}

function resetSignalAnimation() {
  container.classList.remove('playing');
  document.querySelectorAll('.signal-path').forEach(path => {
    path.style.transition = 'none';
    path.style.opacity = '0';
    path.style.strokeDashoffset = path.dataset.length;
  });
  document.querySelectorAll('.signal-highlight').forEach(el => el.classList.remove('active'));
  signalParticle.style.opacity = '0';
  signalParticle.setAttribute('cx', '-50');
  signalParticle.setAttribute('cy', '-50');
}

function stopAnimation() {
  animationRunId++;
  isAnimating = false;
  resetSignalAnimation();
}

function delay(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

function isCurrentRun(runId) {
  return runId === animationRunId;
}

function pulseHighlights(ids, duration, runId) {
  if (!isCurrentRun(runId)) return Promise.resolve();
  setHighlight(ids, true);
  return delay(duration).then(() => {
    if (!isCurrentRun(runId)) return;
    setHighlight(ids, false);
  });
}

function animatePath(pathId, duration, runId) {
  return new Promise(resolve => {
    const path = document.getElementById(pathId);
    if (!path || !isCurrentRun(runId)) {
      resolve();
      return;
    }

    path.style.transition = 'none';
    path.style.opacity = '1';
    path.style.strokeDashoffset = path.dataset.length;
    path.getBoundingClientRect();
    path.style.transition = 'stroke-dashoffset ' + duration + 'ms linear, opacity 180ms ease';
    path.style.strokeDashoffset = '0';
    setTimeout(resolve, duration);
  });
}

function animateParticleAlongPath(pathId, duration, runId) {
  return new Promise(resolve => {
    const path = document.getElementById(pathId);
    if (!path || !isCurrentRun(runId)) {
      resolve();
      return;
    }

    const totalLength = path.getTotalLength();
    const start = performance.now();
    signalParticle.style.opacity = '1';

    function frame(now) {
      if (!isCurrentRun(runId)) {
        resolve();
        return;
      }

      const progress = Math.min((now - start) / duration, 1);
      const point = path.getPointAtLength(totalLength * progress);
      signalParticle.setAttribute('cx', point.x.toFixed(2));
      signalParticle.setAttribute('cy', point.y.toFixed(2));

      if (progress < 1) {
        requestAnimationFrame(frame);
      } else {
        resolve();
      }
    }

    requestAnimationFrame(frame);
  });
}

async function playSuccessAnimation() {
  stopAnimation();
  animationRunId++;
  const runId = animationRunId;
  isAnimating = true;
  container.classList.add('playing');
  scoreDisplay.innerHTML = '<span>Perfect!</span> Watch the electrical signal travel through the neuron...';
  scoreDisplay.className = 'score-display visible success';

  await Promise.all([
    animatePath('signal-d1', 520, runId),
    animatePath('signal-d2', 520, runId),
    animatePath('signal-d3', 520, runId),
    animatePath('signal-d4', 620, runId)
  ]);
  if (!isCurrentRun(runId)) return;

  await pulseHighlights(['hl-soma', 'hl-nucleus'], 360, runId);
  if (!isCurrentRun(runId)) return;

  await pulseHighlights(['hl-hillock'], 220, runId);
  if (!isCurrentRun(runId)) return;

  const mainPathPromise = animatePath('signal-main', 1500, runId);
  const particlePromise = animateParticleAlongPath('signal-main', 1500, runId);

  for (let i = 0; i < highlightGroups.length; i++) {
    await delay(i === 0 ? 140 : 170);
    if (!isCurrentRun(runId)) return;
    setHighlight(highlightGroups[i], true);
    await delay(130);
    if (!isCurrentRun(runId)) return;
    setHighlight(highlightGroups[i], false);
  }

  await Promise.all([mainPathPromise, particlePromise]);
  if (!isCurrentRun(runId)) return;

  await Promise.all([
    animatePath('signal-t1', 420, runId),
    animatePath('signal-t2', 340, runId),
    animatePath('signal-t3', 420, runId),
    pulseHighlights(['hl-terminal-1', 'hl-terminal-2', 'hl-terminal-3'], 360, runId)
  ]);
  if (!isCurrentRun(runId)) return;

  await pulseHighlights(['hl-synapse'], 650, runId);
  if (!isCurrentRun(runId)) return;

  signalParticle.style.opacity = '0';
  isAnimating = false;
  container.classList.remove('playing');
  scoreDisplay.innerHTML = '<span>Perfect!</span> The signal traveled from the dendrites through the neuron to the synapse.';
  scoreDisplay.className = 'score-display visible success';
}

function resetBoard() {
  stopAnimation();
  getDropZones().forEach((dz, idx) => clearZone(dz, idx));
  clearFeedback();
  buildLabels();
}

checkBtn.addEventListener('click', async () => {
  if (isAnimating) return;

  let correct = 0;
  const dzs = getDropZones();
  dzs.forEach(dz => {
    dz.classList.remove('correct', 'incorrect');
    if (dz.dataset.placed) {
      if (dz.dataset.placed === dz.dataset.answer) {
        dz.classList.add('correct');
        correct++;
      } else {
        dz.classList.add('incorrect');
      }
    }
  });

  if (correct === dzs.length) {
    await playSuccessAnimation();
    return;
  }

  scoreDisplay.innerHTML =
    '<span>' + correct + '</span> / ' + dzs.length + ' correct - click a red label to remove it and try again.';
  scoreDisplay.className = 'score-display visible';
});

resetBtn.addEventListener('click', resetBoard);

revealBtn.addEventListener('click', () => {
  stopAnimation();
  getDropZones().forEach(dz => {
    dz.textContent = dz.dataset.answer;
    dz.dataset.placed = dz.dataset.answer;
    dz.classList.add('filled', 'correct');
    dz.classList.remove('incorrect');
    dz.onclick = null;
  });
  labelBank.querySelectorAll('.draggable-label').forEach(el => el.classList.add('placed'));
  scoreDisplay.innerHTML = 'All answers revealed. <span>9</span> / 9';
  scoreDisplay.className = 'score-display visible';
});

buildLabels();
setupDropZones();
initializeSignalPaths();
resetSignalAnimation();
</script>
</body>
</html>
